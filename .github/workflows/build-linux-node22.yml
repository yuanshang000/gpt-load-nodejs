name: Build Linux x64 Node22

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-linux-x64-node22:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22 (x64)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          architecture: 'x64'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Rebuild better-sqlite3 for Linux x64 Node22
        run: npm rebuild better-sqlite3 --build-from-source

      - name: Verify better-sqlite3 native binary
        run: |
          set -e
          find node_modules/better-sqlite3 -name "*.node" -print

      - name: Typecheck
        run: npm run typecheck

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: npm run build:web

      - name: Create deploy bundle
        run: |
          mkdir -p release
          cp -r dist release/dist
          cp -r web/dist release/web-dist
          cp -r node_modules release/node_modules
          cp -r web/node_modules release/web-node_modules
          cp package.json package-lock.json README.md .env.example release/
          cp web/package.json web/package-lock.json release/
          if [ -d data ]; then cp -r data release/data; fi
          tar -czf gpt-load-nodejs-linux-x64-node22.tgz release

      - name: Upload artifact (deploy bundle)
        uses: actions/upload-artifact@v4
        with:
          name: gpt-load-nodejs-linux-x64-node22
          path: gpt-load-nodejs-linux-x64-node22.tgz
          retention-days: 7
