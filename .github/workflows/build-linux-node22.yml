name: Build Linux x64 Node22

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-linux-x64-node22:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22 (x64)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          architecture: 'x64'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 make g++

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Rebuild all root native modules from source
        run: npm rebuild --build-from-source

      - name: Rebuild all web native modules from source
        run: npm --prefix web rebuild --build-from-source

      - name: Ensure better-sqlite3 built from source
        run: npm rebuild better-sqlite3 --build-from-source

      - name: Verify native binaries (root + web)
        run: |
          set -e
          echo "[root native modules]"
          find node_modules/better-sqlite3 -name "*.node" -print
          echo "[all root *.node files]"
          find node_modules -name "*.node" -print || true
          echo "[all web *.node files]"
          find web/node_modules -name "*.node" -print || true

      - name: Typecheck
        run: npm run typecheck

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: npm run build:web

      - name: Create deploy bundle
        run: |
          mkdir -p release
          cp -r dist release/dist
          cp -r web release/web
          cp -r node_modules release/node_modules
          cp package.json package-lock.json README.md .env.example release/
          if [ -f tsconfig.json ]; then cp tsconfig.json release/; fi
          if [ -d data ]; then cp -r data release/data; fi
          if [ -f .nvmrc ]; then cp .nvmrc release/; fi
          tar -czf gpt-load-nodejs-linux-x64-node22.tgz release

      - name: Upload artifact (deploy bundle)
        uses: actions/upload-artifact@v4
        with:
          name: gpt-load-nodejs-linux-x64-node22
          path: gpt-load-nodejs-linux-x64-node22.tgz
          retention-days: 7
